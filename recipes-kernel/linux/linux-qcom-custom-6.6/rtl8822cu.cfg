#
# RTL8822CU WiFi/Bluetooth support
# Realtek RTW88 driver family for RTL8822CU USB dongle
#

# Enable Realtek wireless vendor support
CONFIG_WLAN_VENDOR_REALTEK=y

# RTW88 core driver
CONFIG_RTW88=m
CONFIG_RTW88_CORE=m
CONFIG_RTW88_DEBUG=y
CONFIG_RTW88_DEBUGFS=y

# RTW88 USB support (required for RTL8822CU)
CONFIG_RTW88_USB=m

# RTL8822C chipset support
CONFIG_RTW88_8822C=m

# RTL8822CU USB dongle (combines 8822C + USB)
CONFIG_RTW88_8822CU=m

# Bluetooth support for RTL8822CU (USB HCI)
CONFIG_BT_HCIBTUSB=m
CONFIG_BT_HCIBTUSB_AUTOSUSPEND=y
CONFIG_BT_HCIBTUSB_RTL=y
